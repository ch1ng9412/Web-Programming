<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生資訊表格</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;ㄌ
      margin-top: 50px;
      font-family: Arial, sans-serif;
    }

    table {
      border-collapse: collapse; 
      width: 500px;
    }

    th, td {
      border: 1px solid black; 
      padding: 5px; 
      text-align: left; 
      font-family: "Times New Roman", Times, serif; 
      font-size: 18px;
    }

    .instructions {
      margin-top: 15px;
      text-align: center;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px; /* 增加底部間距，與 iframe 隔開 */
    }

    /* iframe 的 CSS 設定 */
    iframe {
      width: 500px;
      height: 500px;
      border: none; /* 隱藏邊框 */
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Name</th>
      <th>Student ID</th>
    </tr>
    <tr>
      <td>Your name</td>
      <td>Your student ID</td>
    </tr>
  </table>

  <div class="instructions">
    * The borders to collapse into one border.<br>
    * th, td padding 5px.<br>
    * Text aligns to left.
  </div>

  <!-- 嵌入其他網站的 iframe (已更換為允許嵌入的網站) -->
  <iframe src="https://zh.wikipedia.org/wiki/HTML" title="Wikipedia HTML"></iframe>

</body>
</html>
