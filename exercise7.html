<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生資訊表格</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
      font-family: Arial, sans-serif;
    }

    table {
      border-collapse: collapse; 
      width: 500px;
    }

    th, td {
      border: 1px solid black; 
      padding: 5px; 
      text-align: left; 
      font-family: "Times New Roman", Times, serif; 
      font-size: 18px;
    }

    .instructions {
      margin-top: 15px;
      text-align: center;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Name</th>
      <th>Student ID</th>
    </tr>
    <tr>
      <td>Your name</td>
      <td>Your student ID</td>
    </tr>
  </table>

</body>
</html>
